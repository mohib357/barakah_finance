<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>বারাকাহ ফাইন্যান্স — আমার প্রোফাইল</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&family=Noto+Sans+Bengali:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Bengali', sans-serif;
            background: #f0f4f1;
            color: #1A2A1A;
            min-height: 100vh;
        }

        .topbar {
            background: linear-gradient(135deg, #064E3B, #065F46);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar h1 {
            color: #F5D061;
            font-family: 'Noto Serif Bengali', serif;
            font-size: 18px;
        }

        .topbar a {
            color: rgba(255, 255, 255, .7);
            font-size: 13px;
            text-decoration: none;
        }

        .topbar a:hover {
            color: #F5D061;
        }

        .container {
            max-width: 800px;
            margin: 32px auto;
            padding: 0 16px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e5e7eb;
            margin-bottom: 20px;
        }

        .card-title {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 16px;
            font-weight: 700;
            color: #064E3B;
            margin-bottom: 18px;
        }

        .avatar-wrap {
            text-align: center;
            margin-bottom: 20px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1D9E75, #065F46);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            font-weight: 700;
            margin: 0 auto 10px;
            font-family: 'Noto Serif Bengali', serif;
        }

        .user-name {
            font-size: 18px;
            font-weight: 700;
            color: #064E3B;
        }

        .user-role {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .progress-bar {
            height: 8px;
            background: #f0fdf4;
            border-radius: 4px;
            margin: 12px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #064E3B, #1D9E75);
            transition: width .5s;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #065F46;
            margin-bottom: 4px;
        }

        .form-input {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid #d1fae5;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            background: #f0fdf4;
        }

        .form-input:focus {
            border-color: #C9A227;
            background: #fff;
        }

        .form-input:disabled {
            background: #f9fafb;
            color: #888;
        }

        .btn {
            background: linear-gradient(135deg, #064E3B, #065F46);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        .btn:hover {
            background: linear-gradient(135deg, #047857, #059669);
        }

        .btn-logout {
            background: #dc2626;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-admin {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-member {
            background: #d1fae5;
            color: #065F46;
        }

        .badge-user {
            background: #dbeafe;
            color: #1e40af;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #065F46;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 9999;
            display: none;
        }

        @media(max-width:600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <h1>👤 আমার প্রোফাইল</h1>
        <div style="display:flex;gap:16px;align-items:center;">
            <a href="../index.html">🏠 হোম</a>
            <a href="dashboard.html">📊 ড্যাশবোর্ড</a>
            <a href="#" onclick="doLogout()" style="color:#fca5a5;">🚪 লগআউট</a>
        </div>
    </div>

    <div class="container">
        <!-- প্রোফাইল কার্ড -->
        <div class="card">
            <div class="avatar-wrap">
                <div class="avatar" id="prof-avatar">ব</div>
                <div class="user-name" id="prof-name">লোড হচ্ছে...</div>
                <div class="user-role"><span class="badge" id="prof-role-badge">ব্যবহারকারী</span></div>
                <div style="font-size:12px;color:#888;margin-top:6px;" id="prof-id">—</div>
            </div>
            <div style="font-size:12px;color:#555;margin-bottom:4px;">প্রোফাইল সম্পন্নতা: <span id="prof-pct"
                    style="color:#065F46;font-weight:700;">0%</span></div>
            <div class="progress-bar">
                <div class="progress-fill" id="prof-progress" style="width:0%"></div>
            </div>
        </div>

        <!-- এডিট ফর্ম -->
        <div class="card">
            <div class="card-title">✏️ প্রোফাইল সম্পাদনা</div>
            <div class="form-grid">
                <div class="form-group"><label>নাম *</label><input class="form-input" id="pf-name"
                        placeholder="পূর্ণ নাম" /></div>
                <div class="form-group"><label>ইউজারনেম</label><input class="form-input" id="pf-uname" disabled /></div>
                <div class="form-group"><label>মোবাইল</label><input class="form-input" id="pf-phone" disabled /></div>
                <div class="form-group"><label>ইমেইল</label><input class="form-input" id="pf-email" type="email"
                        placeholder="email@example.com" /></div>
                <div class="form-group"><label>জন্ম তারিখ</label><input class="form-input" id="pf-dob" type="date" />
                </div>
                <div class="form-group"><label>পেশা</label><input class="form-input" id="pf-job" placeholder="পেশা" />
                </div>
                <div class="form-group" style="grid-column:span 2"><label>ঠিকানা</label><input class="form-input"
                        id="pf-address" placeholder="বিস্তারিত ঠিকানা" /></div>
                <div class="form-group"><label>এনআইডি নম্বর</label><input class="form-input" id="pf-nid"
                        placeholder="NID" /></div>
                <div class="form-group"><label>রেফার করেছেন</label><input class="form-input" id="pf-referral"
                        disabled /></div>
            </div>
            <div class="form-group"><label>নতুন পাসওয়ার্ড (পরিবর্তন করতে চাইলে)</label><input class="form-input"
                    id="pf-pass" type="password" placeholder="নতুন পাসওয়ার্ড (ঐচ্ছিক)" /></div>
            <button class="btn" onclick="saveProfile()">✅ সংরক্ষণ করুন</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // localStorage থেকে DB helpers
        const DB = {
            get: k => { try { return JSON.parse(localStorage.getItem(k) || 'null'); } catch { return null; } },
            set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
            getUsers: () => JSON.parse(localStorage.getItem('bf_users') || '[]'),
            saveUsers: u => localStorage.setItem('bf_users', JSON.stringify(u)),
            getSession: () => { try { return JSON.parse(localStorage.getItem('bf_session')); } catch { return null; } },
            setSession: u => localStorage.setItem('bf_session', JSON.stringify(u)),
            clearSession: () => localStorage.removeItem('bf_session'),
        };

        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            currentUser = DB.getSession();
            if (!currentUser || !currentUser.verified) {
                alert('দয়া করে প্রথমে লগইন করুন।');
                window.location.href = '../index.html';
                return;
            }
            loadProfile();
        });

        function calcPct(u) {
            const fields = [u.name, u.phone, u.email, u.dob, u.job, u.address, u.nid, u.username];
            return Math.round((fields.filter(f => f && f.length > 0).length / fields.length) * 100);
        }

        function loadProfile() {
            const u = currentUser;
            document.getElementById('prof-avatar').textContent = (u.name || 'ব')[0];
            document.getElementById('prof-name').textContent = u.name || '—';
            document.getElementById('prof-id').textContent = u.memberID ? 'সদস্য আইডি: ' + u.memberID : 'ID: ' + u.id.slice(0, 12);

            const roleMap = { admin: 'অ্যাডমিন', member: 'সদস্য', user: 'ব্যবহারকারী', customer: 'গ্রাহক' };
            const roleClass = { admin: 'badge-admin', member: 'badge-member', user: 'badge-user', customer: 'badge-user' };
            const rb = document.getElementById('prof-role-badge');
            rb.textContent = roleMap[u.role] || u.role;
            rb.className = 'badge ' + (roleClass[u.role] || 'badge-user');

            const pct = calcPct(u);
            document.getElementById('prof-pct').textContent = pct + '%';
            document.getElementById('prof-progress').style.width = pct + '%';

            // ফর্ম ফিল
            const map = { 'pf-name': u.name, 'pf-uname': u.username, 'pf-phone': u.phone, 'pf-email': u.email, 'pf-dob': u.dob, 'pf-job': u.job, 'pf-address': u.address, 'pf-nid': u.nid };
            Object.entries(map).forEach(([id, val]) => { const el = document.getElementById(id); if (el) el.value = val || ''; });

            if (u.referral) {
                const ref = DB.getUsers().find(x => x.id === u.referral);
                document.getElementById('pf-referral').value = ref ? ref.name : u.referral;
            } else {
                document.getElementById('pf-referral').value = 'নেই';
            }
        }

        function saveProfile() {
            const users = DB.getUsers();
            const idx = users.findIndex(u => u.id === currentUser.id);
            if (idx < 0) { toast('ব্যবহারকারী পাওয়া যায়নি।', '#e53e3e'); return; }
            const newPass = document.getElementById('pf-pass').value;
            if (newPass) {
                if (newPass.length < 8 || !/[a-zA-Z]/.test(newPass) || !/[0-9]/.test(newPass)) {
                    toast('পাসওয়ার্ড ৮+ অক্ষর এবং সংখ্যা ও লেটার থাকতে হবে।', '#e53e3e'); return;
                }
                users[idx].password = newPass;
            }
            users[idx].name = document.getElementById('pf-name').value.trim() || users[idx].name;
            users[idx].email = document.getElementById('pf-email').value.trim() || users[idx].email;
            users[idx].dob = document.getElementById('pf-dob').value;
            users[idx].job = document.getElementById('pf-job').value.trim();
            users[idx].address = document.getElementById('pf-address').value.trim();
            users[idx].nid = document.getElementById('pf-nid').value.trim();
            users[idx].profileComplete = calcPct(users[idx]);
            DB.saveUsers(users);
            currentUser = users[idx];
            DB.setSession(currentUser);
            loadProfile();
            toast('প্রোফাইল সংরক্ষিত হয়েছে ✅');
            document.getElementById('pf-pass').value = '';
        }

        function doLogout() {
            DB.clearSession();
            localStorage.removeItem('bf_remember');
            window.location.href = '../index.html';
        }

        function toast(msg, color = '#065F46') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.background = color; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3500);
        }
    </script>
</body>

</html>
